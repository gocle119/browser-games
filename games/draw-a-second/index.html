<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Draw a Second — Arcade</title>
  <link rel="stylesheet" href="../../style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="top-bar">
    <a class="back-btn" href="../../index.html">← Home</a>
    <div class="hud">
      <div class="hud-item">
        <span class="hud-label">Round</span>
        <span class="hud-value" id="round-hud">1 / 10</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Score</span>
        <span class="hud-value" id="score">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Best</span>
        <span class="hud-value" id="best-off">—</span>
      </div>
    </div>
  </div>

  <div class="timer-track">
    <div id="timer-bar"></div>
  </div>

  <div id="game-area">
    <div id="target-label">1.000 s</div>
    <div id="status-label">Tap to start</div>
    <div id="result-label"></div>
    <div id="tap-hint">Tap anywhere · Space on desktop</div>
  </div>

  <div id="end-screen" hidden>
    <div class="end-header">
      <h2>Game Over</h2>
      <p id="end-sub">Here's how you did</p>
    </div>

    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-val" id="end-score">0</div>
        <div class="stat-lbl">Score</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="end-best-off">—</div>
        <div class="stat-lbl">Best Off</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="end-avg-off">—</div>
        <div class="stat-lbl">Avg Off</div>
      </div>
    </div>

    <div class="lb-title">🌍 Global Top Scores</div>
    <div id="global-leaderboard"><div class="lb-loading">Loading…</div></div>

    <div class="global-submit">
      <input type="text" id="player-name" maxlength="10" placeholder="Your name" autocomplete="off">
      <button class="btn btn-accent" id="btn-submit-score">Submit</button>
    </div>

    <div class="lb-title">Your Scores</div>
    <div id="leaderboard"></div>

    <button class="btn btn-accent btn-full" id="btn-play-again">Play Again</button>
    <a class="btn btn-ghost btn-full" href="../../index.html">Back to Home</a>
  </div>

  <script src="../../shared/scores.js"></script>
  <script src="../../shared/counter.js"></script>
  <script src="game.js"></script>
</body>
</html>
