<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Spell It Right — Arcade</title>
  <link rel="stylesheet" href="../../style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Top bar -->
  <div class="top-bar">
    <a class="back-btn" href="../../index.html">← Home</a>
    <div class="hud">
      <div class="hud-item">
        <span class="hud-label">Lives</span>
        <span class="hud-value" id="lives">❤️❤️❤️</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Score</span>
        <span class="hud-value" id="score">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Streak</span>
        <span class="hud-value" id="streak">—</span>
      </div>
    </div>
  </div>

  <!-- Timer bar -->
  <div class="timer-track">
    <div id="timer-bar"></div>
  </div>

  <!-- Game area -->
  <div id="game-area">
    <div class="prompt-row">
      <span class="prompt">Which is spelled correctly?</span>
      <span id="diff-badge">Easy</span>
    </div>

    <div class="tile-grid">
      <button class="tile" id="tile-0"><span id="word-0"></span></button>
      <button class="tile" id="tile-1"><span id="word-1"></span></button>
      <button class="tile" id="tile-2"><span id="word-2"></span></button>
      <button class="tile" id="tile-3"><span id="word-3"></span></button>
    </div>

    <div class="key-hint-row">
      <span>1 — top left</span>
      <span>2 — top right</span>
      <span>3 — bottom left</span>
      <span>4 — bottom right</span>
    </div>

    <!-- Feedback bar -->
    <div class="feedback-bar" id="feedback" hidden>
      <div class="feedback-top">
        <span id="feedback-icon"></span>
        <span id="feedback-text"></span>
      </div>
      <div id="feedback-conn"></div>
    </div>
  </div>

  <!-- End screen -->
  <div id="end-screen" hidden>
    <div class="end-header">
      <h2>Game Over</h2>
      <p>Here's how you did</p>
    </div>

    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-val" id="end-score">0</div>
        <div class="stat-lbl">Score</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="end-streak">0</div>
        <div class="stat-lbl">Best Streak</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="end-best">0</div>
        <div class="stat-lbl">Personal Best</div>
      </div>
    </div>

    <div class="lb-title">🌍 Global Top Scores</div>
    <div id="global-leaderboard"><div class="lb-loading">Loading…</div></div>

    <div class="global-submit">
      <input type="text" id="player-name" maxlength="10" placeholder="Your name" autocomplete="off">
      <button class="btn btn-accent" id="btn-submit-score">Submit</button>
    </div>

    <div class="lb-title">Your Scores</div>
    <div id="leaderboard"></div>

    <button class="btn btn-accent btn-full" id="btn-play-again">Play Again</button>
    <a class="btn btn-ghost btn-full" href="../../index.html">Back to Home</a>
  </div>

  <script src="../../shared/scores.js"></script>
  <script src="../../shared/counter.js"></script>
  <script src="words.js"></script>
  <script src="game.js"></script>
</body>
</html>
